<!DOCTYPE html>
<html lang="en">

<head>
  <title>Our simple HTTP server</title>
  <link rel="stylesheet" type="text/css" href="/style.css">

  <script>
    const handleResponse = async (response, method) => {
      const content = document.querySelector('#content');

      switch (response.status) {
        case 200:
          content.innerHTML = `<b>Success</b>`;
          break;
        case 201:
          content.innerHTML = '<b>Created</b>';
          break;
        case 204:
          content.innerHTML = '<b>Updated (No Content)</b>';
          return;
        case 400:
          content.innerHTML = `<b>Bad Request</b>`;
          break;
        case 404:
          content.innerHTML = `<b>Not Found</b>`;
          break;
        default:
          content.innerHTML = `Error code not implemented by client.`;
          break;
      }

      if (method !== 'head') {
        const obj = await response.json();
        if (obj.message) {
          content.innerHTML += `<p>Message: ${obj.message}</p>`;
        } else {
          content.innerHTML += `<p>${JSON.stringify(obj)}}</p>`;
        }
      }
    };

    const sendPost = async (nameForm) => {
      const nameAction = nameForm.getAttribute('action');//addUser
      const nameMethod = nameForm.getAttribute('method');//POST

      const name = nameForm.querySelector('#nameField').value;
      const age = nameForm.querySelector('#ageField').value;

      const formData = JSON.stringify({ name, age });


      const response = await fetch(nameAction, {
        method: nameMethod,
        headers: {
          'Content-Type': 'application/json',
          'Content-Length': formData.length,
          'Accept': 'application/json'
        },
        body: formData
      });

      handleResponse(response, 'post');

    };

    const sendGet = async (form) => {
      const methodSelect = document.querySelector('#methodSelect');

      // send get request
      const response = await fetch(form.action, {
        method: methodSelect.value,
        headers: {
          'Accept': 'application/json'
        }
      });

      handleResponse(response, methodSelect.value);
    }

    const init = () => {
      // const nameForm = document.querySelector('#nameForm');
      // const userForm = document.querySelector('#userForm');

      // const addUser = (e) => {
      //   e.preventDefault();
      //   sendPost(nameForm);
      //   return false;
      // }

      // const getUsers = (e) => {
      //   e.preventDefault();
      //   sendGet(userForm);
      //   return false;
      // }

      // nameForm.addEventListener('submit', addUser);
      // userForm.addEventListener('submit', getUsers);

      // Get forms
      const bookForm = document.querySelector('#getBook');
      const authorForm = document.querySelector('#getAuthor');
      const languageForm = document.querySelector('#getLanguage');
      const yearForm = document.querySelector('#getYear');

      // write their functions
      const getBooks = (e) => {
        e.preventDefault();
        sendGet(bookForm);
        return false;
      }

      const getAuthor = (e) => {
        e.preventDefault();
        sendGet(authorForm);
        return false;
      }

      const getLanguage = (e) => {
        e.preventDefault();
        sendGet(languageForm);
        return false;
      }

      const getYear = (e) => {
        e.preventDefault();
        sendGet(yearForm);
        return false;
      }

      // hook up events
      bookForm.addEventListener('submit', getBooks);
      authorForm.addEventListener('submit', getAuthor);
      languageForm.addEventListener('submit', getLanguage);
      yearForm.addEventListener('submit', getYear);
    };

    window.onload = init;

  </script>
</head>

<body>
  <section id="top">
    <h3>Books API</h3>

    <form id="getBook" action="/getBook" method="GET">
      <label for="title">Title: </label>
      <input id="titleField" type="text" name="title" />
      <label for="author">Author: </label>
      <input id="authorGet" type="text" name="author" />
      <label for="language">Language: </label>
      <input id="languageGet" type="text" name="language" />
      <label for="year">Language: </label>
      <input id="yearGet" type="num" name="year" min=0 max=2026 />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Book" />
    </form> <br>

    <form id="getAuthor" action="/getAuthor" method="GET">
      <label for="author">Author: </label>
      <input id="authorGet" type="text" name="author" />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Author" />
    </form> <br>

    <form id="getLanguage" action="/getLanguage" method="GET">
      <label for="language">Language: </label>
      <input id="languageGet" type="text" name="language" />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Language" />
    </form> <br>

    <form id="getYear" action="/getYear" method="GET">
      <label for="year">Language: </label>
      <input id="yearGet" type="num" name="year" min=0 max=2026 />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Language" />
    </form> <br>

    <form id="addBookForm" action="/addBook" method="POST">
      <label for="name">Name: </label>
      <input id="nameField" type="text" name="name" />
      <label for="author">Author: </label>
      <input id="authorPost" type="text" name="author" />
      <label for="language">Language: </label>
      <input id="languagePost" type="text" name="language" />
      <label for="year">Year: </label>
      <input id="yearPost" type="num" name="year" min=0 max=2026 />
      <input type="submit" value="Add Book" />
    </form>
  </section>
  <section id="content">
  </section>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Our simple HTTP server</title>
  <link rel="stylesheet" type="text/css" href="/style.css">

  <script>
    const handleResponse = async (response, method) => {
      const content = document.querySelector('#content');

      switch (response.status) {
        case 200:
          content.innerHTML = `<b>Success</b>`;
          break;
        case 201:
          content.innerHTML = '<b>Created</b>';
          break;
        case 204:
          content.innerHTML = '<b>Updated (No Content)</b>';
          return;
        case 400:
          content.innerHTML = `<b>Bad Request</b>`;
          break;
        case 404:
          content.innerHTML = `<b>Not Found</b>`;
          break;
        default:
          content.innerHTML = `Error code not implemented by client.`;
          break;
      }

      if (method === 'get') {
        const obj = await response.json();
        if (obj.message) {
          content.innerHTML += `<p>Message: ${obj.message}</p>`;
        } else {
          content.innerHTML += `<a href=${obj.books[0].link}>Book Article</a>`;
        }
        if (obj.books) {
          content.innerHTML += `<p>${JSON.stringify(obj.books[0])}...</p>`;
        }
      }

      if (method === 'post') {
        //Magic words
        const obj = await response.json();
        if (obj.message) {
          content.innerHTML += `<p>Message: ${obj.message}</p>`;
        } else {
          content.innerHTML += `<p>${obj.title} by ${obj.author}</p>`;
        }

      }
    };

    const sendPost = async (bookForm) => {
      const bookAction = bookForm.getAttribute('action');//addUser
      const bookMethod = bookForm.getAttribute('method');//POST

      let title;
      let formData;

      if (bookAction === '/addBook') {
        title = bookForm.querySelector('#titlePost').value;
        const author = bookForm.querySelector('#authorPost').value;
        const language = bookForm.querySelector('#languagePost').value;
        const year = bookForm.querySelector('#yearPost').value;

        formData = JSON.stringify({ title, author, language, year });
      }
      else {
        title = bookForm.querySelector('#titlePost').value;
        const score = bookForm.querySelector('#scorePost').value;

        formData = JSON.stringify({ title, score});
      }

      console.log(formData);

      const response = await fetch(bookAction, {
        method: bookMethod,
        headers: {
          'Content-Type': 'application/json',
          'Content-Length': formData.length,
          'Accept': 'application/json'
        },
        body: formData
      });

      handleResponse(response, 'post');
    };

    const sendGet = async (form) => {
      const methodSelect = form.querySelector('#methodSelect');
      let formData;
      let title;
      let author;
      let language;
      let year;

      switch (form.id) {
        case 'getBook':
          title = form.querySelector('#titleField').value;
          author = form.querySelector('#authorGet').value;
          language = form.querySelector('#languageGet').value;
          year = form.querySelector('#yearGet').value;

          formData = `title=${title}&author=${author}&language=${language}&year=${year}`;
          break;
        case 'getAuthor':
          author = form.querySelector('#authorGet').value;
          formData = `author=${author}`;
          break;
        case 'getLanguage':
          language = form.querySelector('#languageGet').value;
          formData = `language=${language}`;
          break;
        case 'getYear':
          year = form.querySelector('#yearGet').value;
          formData = `year=${year}`;
          break;

      }

      // send get request
      const response = await fetch(`${form.action}?${formData}`, {
        method: methodSelect.value,
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'Accept': 'application/json'
        }
      });

      handleResponse(response, methodSelect.value);
    }

    const init = () => {
      // Get forms
      const bookForm = document.querySelector('#getBook');
      const authorForm = document.querySelector('#getAuthor');
      const languageForm = document.querySelector('#getLanguage');
      const yearForm = document.querySelector('#getYear');
      const addBookForm = document.querySelector('#addBookForm');
      const reviewBookForm = document.querySelector('#reviewBookForm');

      // write their functions
      const getBooks = (e) => {
        e.preventDefault();
        sendGet(bookForm);
        return false;
      }

      const getAuthor = (e) => {
        e.preventDefault();
        sendGet(authorForm);
        return false;
      }

      const getLanguage = (e) => {
        e.preventDefault();
        sendGet(languageForm);
        return false;
      }

      const getYear = (e) => {
        e.preventDefault();
        sendGet(yearForm);
        return false;
      }

      const addBook = (e) => {
        e.preventDefault();
        sendPost(addBookForm);
        return false;
      }

      const reviewBook = (e) => {
        e.preventDefault();
        sendPost(reviewBookForm);
        return false;
      }

      // hook up events
      bookForm.addEventListener('submit', getBooks);
      authorForm.addEventListener('submit', getAuthor);
      languageForm.addEventListener('submit', getLanguage);
      yearForm.addEventListener('submit', getYear);
      addBookForm.addEventListener('submit', addBook);
      reviewBookForm.addEventListener('submit', reviewBook);
    };

    window.onload = init;

  </script>
</head>

<body>
  <section id="top">
    <h1>Books API</h1>
    <a href = '/docs'>See Documentation</a>

    <form id="getBook" action="/getBook" method="GET">
      <label for="title">Title: </label>
      <input id="titleField" type="text" name="title" />
      <label for="author">Author: </label>
      <input id="authorGet" type="text" name="author" />
      <label for="language">Language: </label>
      <input id="languageGet" type="text" name="language" />
      <label for="year">Year: </label>
      <input id="yearGet" type="num" name="year" min=-2000 max=2026 />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Book" />
    </form> <br>

    <form id="getAuthor" action="/getAuthor" method="GET">
      <label for="author">Author: </label>
      <input id="authorGet" type="text" name="author" />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Author" />
    </form> <br>

    <form id="getLanguage" action="/getLanguage" method="GET">
      <label for="language">Language: </label>
      <input id="languageGet" type="text" name="language" />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Language" />
    </form> <br>

    <form id="getYear" action="/getYear" method="GET">
      <label for="year">Year: </label>
      <input id="yearGet" type="num" name="year" min=-2000 max=2026 />
      <select id="methodSelect">
        <option value="get">GET</option>
        <option value="head">HEAD</option>
      </select>
      <input type="submit" value="Get Year" />
    </form> <br>

    <form id="addBookForm" action="/addBook" method="POST">
      <label for="Title">Title: </label>
      <input id="titlePost" type="text" name="title" />
      <label for="author">Author: </label>
      <input id="authorPost" type="text" name="author" />
      <label for="language">Language: </label>
      <input id="languagePost" type="text" name="language" />
      <label for="year">Year: </label>
      <input id="yearPost" type="num" name="year" min=-2000 max=2026 />
      <input type="submit" value="Add Book" />
    </form>

    <form id="reviewBookForm" action="/reviewBook" method="POST">
      <label for="Title">Title: </label>
      <input id="titlePost" type="text" name="title" />
      <label for="score">Score: </label>
      <input id="scorePost" type="num" name="score" min=0 max=5 />/5
      <input type="submit" value="Submit Review" />
    </form>
  </section>
  <section id="content">
  </section>
</body>

</html>
